name: Bug report
description: Report a problem with Weve Bridge
labels: ["bug"]
body:
  - type: input
    id: version
    attributes:
      label: Bridge version
      description: Output of `weve-bridge --version` or the Docker image tag
      placeholder: "v1.2.3"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - Docker
        - Binary (from releases)
        - Built from source
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Set WEVE_BRIDGE_ALLOWED_HOSTS=...
        2. Run `docker run ...`
        3. Send request to ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      description: Run with `WEVE_BRIDGE_LOG_LEVEL=debug` and paste relevant output.
      render: text
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, container runtime, proxy setup, etc.
      placeholder: |
        - OS: Ubuntu 22.04
        - Runtime: Docker 24.0
        - Behind corporate proxy: yes/no
    validations:
      required: false
