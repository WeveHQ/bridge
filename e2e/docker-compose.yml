services:
  hub:
    build:
      context: ..
      dockerfile: Dockerfile
    command: ["hub", "--listen=:8080"]
    environment:
      WEVE_BRIDGE_HUB_TOKEN_VERIFIER_URL: http://verifier:8081/verify
      WEVE_BRIDGE_HUB_TOKEN_VERIFIER_SECRET: verifier-secret
      WEVE_BRIDGE_HUB_SECRET: internal-secret
      WEVE_BRIDGE_HUB_POLL_HOLD_SECONDS: "1"
      WEVE_BRIDGE_HUB_GLOBAL_IN_FLIGHT: "8"
    ports:
      - "${WEVE_BRIDGE_HUB_PORT}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  edge:
    build:
      context: ..
      dockerfile: Dockerfile
    restart: on-failure
    command:
      [
        "edge",
        "--token=${WEVE_BRIDGE_EDGE_TOKEN}",
        "--hub-url=http://hub:8080"
      ]
    depends_on:
      - hub
      - verifier
    environment:
      WEVE_BRIDGE_EDGE_POLL_CONCURRENCY: "2"
      WEVE_BRIDGE_EDGE_HEARTBEAT_SECONDS: "1"
      WEVE_BRIDGE_EDGE_POLL_TIMEOUT_MS: "1500"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 2s

  verifier:
    image: python:3.12-alpine
    working_dir: /app
    environment:
      WEVE_BRIDGE_EDGE_TOKEN: ${WEVE_BRIDGE_EDGE_TOKEN}
      WEVE_BRIDGE_HUB_TOKEN_VERIFIER_SECRET: verifier-secret
      WEVE_BRIDGE_HUB_VERIFIER_BRIDGE_ID: bridge_123
      WEVE_BRIDGE_HUB_VERIFIER_TENANT_ID: tenant_123
    volumes:
      - ./verifier.py:/app/verifier.py:ro
    command: ["python", "/app/verifier.py"]

  target:
    image: python:3.12-alpine
    working_dir: /app
    volumes:
      - ./target.py:/app/target.py:ro
    command: ["python", "/app/target.py"]
